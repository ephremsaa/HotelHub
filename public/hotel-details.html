<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelHub - Hotel Details</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                HotelHub
            </a>
            
            <ul class="nav-menu d-none" id="main-nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/hotels.html">Destinations</a></li>
            </ul>

            <div class="nav-auth" id="nav-auth"></div>
        </div>
    </nav>

    <main class="container" style="margin-top: 2rem;">
        
        <div id="hotel-header-placeholder">
            <h1 class="mb-4">Loading luxury stay...</h1>
        </div>

    </main>

    <!-- Full-screen booking modal with animation -->
    <div class="modal-overlay" id="booking-modal">
        <div class="modal-content">
            <div class="d-flex justify-between align-center mb-4">
                <h3 style="font-size: 1.5rem; margin:0;">Complete Booking</h3>
                <button onclick="closeModal()" style="background:transparent; border:none; cursor:pointer; color:var(--text-muted);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <form id="booking-form">
                <input type="hidden" id="book-room-id">
                <input type="hidden" id="book-hotel-id">
                <input type="hidden" id="book-price-per-night">
                
                <div class="form-group">
                    <label class="form-label">Check-in Date</label>
                    <input type="date" class="form-control" id="book-check-in" required onchange="calculatePrice()">
                </div>
                <div class="form-group">
                    <label class="form-label">Check-out Date</label>
                    <input type="date" class="form-control" id="book-check-out" required onchange="calculatePrice()">
                </div>
                
                <div style="background: var(--bg-color); padding: 1.5rem; border-radius: var(--radius-md); margin-bottom: 2rem; border: 1px dashed var(--border-color);">
                    <div class="d-flex justify-between mb-2">
                        <span style="color: var(--text-muted)">Price per night</span>
                        <span id="display-price-night" style="font-weight: 500;">0 BIRR</span>
                    </div>
                    <div class="d-flex justify-between mb-2">
                        <span style="color: var(--text-muted)">Taxes & Fees</span>
                        <span style="font-weight: 500;">Included</span>
                    </div>
                    <hr style="border:none; border-top:1px solid var(--border-color); margin: 1rem 0;">
                    <div class="d-flex justify-between align-center">
                        <span style="font-weight: 600; font-size: 1.1rem;">Total Price</span>
                        <span style="font-family: var(--font-display); font-weight: 800; font-size: 1.5rem; color: var(--primary-color);"><span id="total-price-calc">0.00</span> BIRR</span>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Confirm Reservation</button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (window.innerWidth > 768) {
            document.getElementById('main-nav-menu').classList.remove('d-none');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const hotelId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', () => {
            if (hotelId) {
                fetchHotelDetails();
            } else {
                document.getElementById('hotel-header-placeholder').innerHTML = '<div class="alert alert-error">Hotel not found.</div>';
            }
        });

        async function fetchHotelDetails() {
            try {
                const hotel = await apiCall(`/hotels/${hotelId}`);
                const rooms = await apiCall(`/rooms/hotel/${hotelId}`);
                
                const defaultImg = 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80';
                const imgUrl = hotel.cover_image || defaultImg;
                
                let starsHTML = '';
                for(let i=0; i<hotel.star_rating; i++) {
                    starsHTML += '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="color: var(--warning)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>';
                }

                // Render page content
                document.querySelector('main.container').innerHTML = `
                    <div class="d-flex justify-between align-center mb-4" style="flex-wrap: wrap; gap: 1rem;">
                        <div>
                            <div class="d-flex align-center gap-2 mb-2">
                                ${starsHTML}
                            </div>
                            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary-dark);">${hotel.hotel_name}</h1>
                            <p style="color: var(--text-muted); font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                ${hotel.address}, ${hotel.city}, ${hotel.country}
                            </p>
                        </div>
                        <div style="text-align: right;">
                            <button id="favorite-btn" class="btn btn-outline" style="border-radius: var(--radius-full);" onclick="toggleFavorite(${hotelId})"><svg id="fav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:0.5rem;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg> <span id="fav-text">Save to Favorites</span></button>
                        </div>
                    </div>
                    
                    <div class="gallery-masonry">
                        <img src="${imgUrl}" alt="Main view" class="main-img">
                        <img src="https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&q=80" alt="Room detail">
                        <img src="https://images.unsplash.com/photo-1571501434316-4a46a5814521?auto=format&fit=crop&q=80" alt="Pool view">
                    </div>
                    
                    <div class="hotel-details-layout">
                        <div class="main-details">
                            <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">Overview</h2>
                            <p style="font-size: 1.1rem; color: var(--text-muted); line-height: 1.8; margin-bottom: 3rem;">
                                ${hotel.description || 'Experience world-class service at this luxurious property. Nestled in the heart of the city, this hotel offers unparalleled comfort, breathtaking views, and modern amenities designed to make your stay unforgettable.'}
                            </p>
                            
                            <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">Premium Amenities</h2>
                            <div class="amenities-grid mb-8">
                                <div class="amenity-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg> High-Speed WiFi</div>
                                <div class="amenity-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> Room Service</div>
                                <div class="amenity-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg> Fitness Center</div>
                                <div class="amenity-card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg> 24/7 Front Desk</div>
                            </div>
                            
                            <h2 class="section-title" style="font-size: 1.5rem; margin-bottom: 1.5rem;">Select Your Room</h2>
                            <div id="rooms-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
                                <!-- Rooms injected here -->
                            </div>
                        </div>
                        
                        <div class="sidebar-wrapper">
                            <div class="booking-sidebar">
                                <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; color: var(--primary-color);">Excellent Choice</div>
                                <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem;">Select a room from the list to begin your reservation process. We offer secure booking and instant confirmation.</p>
                                
                                <div style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 1rem; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 500; display: flex; gap: 0.5rem;">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                    Free cancellation on most rooms
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Render rooms
                const roomsList = document.getElementById('rooms-list');
                const availableRooms = rooms.filter(r => r.status === 'available');
                
                if (availableRooms.length === 0) {
                    roomsList.innerHTML = '<div style="padding: 2rem; text-align: center; background: var(--bg-color); border-radius: var(--radius-md);">No rooms available for your dates.</div>';
                } else {
                    roomsList.innerHTML = availableRooms.map(room => `
                        <div style="display: flex; border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; background: var(--card-bg); box-shadow: var(--shadow-sm);">
                            <div style="width: 200px; background: url('https://images.unsplash.com/photo-1590490359683-658d3d23f972?auto=format&fit=crop&q=80') center/cover;"></div>
                            <div style="padding: 1.5rem; flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
                                <div>
                                    <h3 style="font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--primary-dark);">${room.room_type_name}</h3>
                                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Room ${room.room_number} • Floor ${room.floor || '1'}</p>
                                </div>
                                <div class="d-flex justify-between align-center" style="margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                                    <div style="font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--primary-color);">
                                        ${room.price_per_night} BIRR <span style="font-size: 0.85rem; font-weight: 400; color: var(--text-muted);">/ night</span>
                                    </div>
                                    <button class="btn btn-primary" onclick="openBookModal(${room.id}, ${hotelId}, ${room.price_per_night})">Reserve</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

            } catch (error) {
                console.error(error);
                showToast('Failed to load hotel details', 'error');
            }
            
            // Check favorite status if customer
            const user = JSON.parse(localStorage.getItem('user'));
            if (user && user.role === 'customer') {
                checkFavoriteStatus(hotelId);
            } else {
                document.getElementById('favorite-btn').style.display = 'none';
            }
        }

        let isFavorited = false;

        async function checkFavoriteStatus(hotelId) {
            try {
                const res = await apiCall(`/favorites/status/${hotelId}`);
                isFavorited = res.isFavorited;
                updateFavoriteUI();
            } catch (err) {
                console.error(err);
            }
        }

        async function toggleFavorite(hotelId) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'customer') {
                showToast('Please log in as a customer to save favorites', 'error');
                return;
            }
            try {
                if (isFavorited) {
                    await apiCall(`/favorites/${hotelId}`, 'DELETE');
                    isFavorited = false;
                    showToast('Removed from favorites');
                } else {
                    await apiCall('/favorites', 'POST', { hotel_id: hotelId });
                    isFavorited = true;
                    showToast('Saved to favorites', 'success');
                }
                updateFavoriteUI();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function updateFavoriteUI() {
            const btn = document.getElementById('favorite-btn');
            const icon = document.getElementById('fav-icon');
            const text = document.getElementById('fav-text');
            if (isFavorited) {
                btn.classList.add('btn-primary');
                btn.classList.remove('btn-outline');
                icon.setAttribute('fill', 'currentColor');
                text.innerText = 'Saved to Favorites';
            } else {
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-outline');
                icon.setAttribute('fill', 'none');
                text.innerText = 'Save to Favorites';
            }
        }

        function openBookModal(roomId, hId, price) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                showToast('Please sign in to book a room', 'error');
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }
            if (user.role !== 'customer') {
                showToast('Only customers can book rooms', 'error');
                return;
            }

            document.getElementById('book-room-id').value = roomId;
            document.getElementById('book-hotel-id').value = hId;
            document.getElementById('book-price-per-night').value = price;
            document.getElementById('display-price-night').innerText = `${price} BIRR`;
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('book-check-in').min = today;
            document.getElementById('book-check-out').min = today;

            document.getElementById('booking-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('booking-modal').classList.remove('active');
        }

        function calculatePrice() {
            const checkIn = document.getElementById('book-check-in').value;
            const checkOut = document.getElementById('book-check-out').value;
            const pricePerNight = document.getElementById('book-price-per-night').value;
            
            if (checkIn && checkOut) {
                const start = new Date(checkIn);
                const end = new Date(checkOut);
                const diffTime = end - start;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                
                if (diffDays > 0) {
                    const total = diffDays * pricePerNight;
                    document.getElementById('total-price-calc').innerText = total.toFixed(2);
                } else {
                    document.getElementById('total-price-calc').innerText = '0.00';
                }
            }
        }

        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const roomId = document.getElementById('book-room-id').value;
            const hId = document.getElementById('book-hotel-id').value;
            const checkIn = document.getElementById('book-check-in').value;
            const checkOut = document.getElementById('book-check-out').value;
            const totalPrice = document.getElementById('total-price-calc').innerText;

            if (totalPrice === '0.00' || new Date(checkIn) >= new Date(checkOut)) {
                showToast('Invalid dates selected', 'error');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="loading" style="display:inline-block; width:16px; height:16px; border:2px solid white; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></span> Processing...';
            btn.disabled = true;

            try {
                await apiCall('/bookings', 'POST', {
                    hotel_id: hId,
                    room_id: roomId,
                    check_in: checkIn,
                    check_out: checkOut,
                    total_price: totalPrice
                });
                
                showToast('Reservation confirmed!');
                setTimeout(() => {
                    window.location.href = '/customer-dashboard.html';
                }, 1500);
            } catch (err) {
                showToast(err.message, 'error');
                btn.innerHTML = 'Confirm Reservation';
                btn.disabled = false;
            }
        });

        // Add keyframes for spinner dynamically since we didn't add it in style.css
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
