<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookEasy - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1><a href="/" style="margin:0">BookEasy</a></h1>
        <div id="nav-links"></div>
    </header>
    <div class="container">
        <h2>Dashboard</h2>
        <div id="error-msg" class="error"></div>
        
        <div id="provider-section" style="display:none; margin-bottom: 2rem;">
            <h3>Create a Service</h3>
            <form id="service-form" class="card">
                <div class="form-group">
                    <label>Service Name</label>
                    <input type="text" id="s_name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="s_desc">
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="s_dur" required>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" id="s_price" step="0.01" required>
                </div>
                <button type="submit">Create Service</button>
            </form>
        </div>

        <h3>My Appointments</h3>
        <div id="appointments-list">Loading...</div>
    </div>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = '/login.html';
                return;
            }

            if (user.role === 'provider' || user.role === 'admin') {
                document.getElementById('provider-section').style.display = 'block';
                document.getElementById('service-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const name = document.getElementById('s_name').value;
                    const description = document.getElementById('s_desc').value;
                    const duration_minutes = document.getElementById('s_dur').value;
                    const price = document.getElementById('s_price').value;
                    try {
                        await apiCall('/services', 'POST', { name, description, duration_minutes, price });
                        alert('Service created');
                        document.getElementById('service-form').reset();
                    } catch (err) {
                        alert(err.message);
                    }
                });
            }

            loadAppointments(user.role);
        });

        async function loadAppointments(role) {
            try {
                const endpoint = role === 'customer' ? '/appointments/customer' : '/appointments/provider';
                const appointments = await apiCall(endpoint);
                const list = document.getElementById('appointments-list');
                list.innerHTML = '';
                if (appointments.length === 0) list.innerHTML = '<p>No appointments found.</p>';
                
                appointments.forEach(a => {
                    let actionHtml = '';
                    if (role === 'provider') {
                        actionHtml = `
                            <select onchange="updateStatus(${a.id}, this.value)">
                                <option value="pending" ${a.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="confirmed" ${a.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                                <option value="cancelled" ${a.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        `;
                    } else {
                        actionHtml = `<span style="font-weight:bold; color: ${a.status === 'confirmed' ? 'green' : (a.status === 'cancelled' ? 'red' : 'orange')}">${a.status.toUpperCase()}</span>`;
                    }

                    list.innerHTML += `
                        <div class="card">
                            <p><strong>Service:</strong> ${a.service_name}</p>
                            <p><strong>Date:</strong> ${new Date(a.appointment_date).toLocaleString()}</p>
                            <p><strong>Status:</strong> ${actionHtml}</p>
                            ${role === 'provider' ? `<p><strong>Customer:</strong> ${a.customer_name}</p>` : `<p><strong>Provider:</strong> ${a.provider_name}</p>`}
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('appointments-list').innerHTML = `<p class="error">${err.message}</p>`;
            }
        }

        async function updateStatus(id, status) {
            try {
                await apiCall(`/appointments/${id}/status`, 'PUT', { status });
                alert('Status updated');
            } catch (err) {
                alert(err.message);
            }
        }
    </script>
</body>
</html>
