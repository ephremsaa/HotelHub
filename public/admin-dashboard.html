<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelHub - Admin Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                HotelHub Admin
            </a>
            <div class="nav-auth" id="nav-auth"></div>
        </div>
    </nav>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <ul class="sidebar-nav">
                <li><a href="#" class="active" onclick="showSection('overview', event)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg> Overview</a></li>
                <li><a href="#" onclick="showSection('hotels-list', event)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg> Directory</a></li>
            </ul>
        </aside>
        
        <main class="dashboard-content">
            
            <section id="overview">
                <div class="d-flex justify-between align-center mb-8">
                    <h1 style="font-size: 2rem; margin: 0;">System Overview</h1>
                    <button class="btn btn-primary" style="padding: 0.5rem 1.5rem;">Generate Report</button>
                </div>
                
                <div class="stat-grid">
                    <div class="stat-card" style="background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); color: white; border:none;">
                        <span class="stat-card-title" style="color: rgba(255,255,255,0.8);">Registered Properties</span>
                        <span class="stat-card-value" id="stat-hotels" style="color: white;">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card-title">System Health</span>
                        <span class="stat-card-value" style="color: var(--success); display: flex; align-items: center; gap: 0.5rem;">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                            100%
                        </span>
                    </div>
                </div>

                <div class="table-wrapper table-responsive">
                    <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); background: var(--bg-color);">
                        <h3 style="margin: 0; font-size: 1.1rem;">Platform Activity</h3>
                    </div>
                    <div style="padding: 3rem; text-align: center; color: var(--text-muted);">
                        Activity metrics are currently stable. 
                    </div>
                </div>
            </section>

            <section id="hotels-list" class="d-none">
                <div class="d-flex justify-between align-center mb-8">
                    <h1 style="font-size: 2rem; margin: 0;">Property Directory</h1>
                    <div class="search-field" style="background: var(--card-bg); border-radius: var(--radius-full); padding: 0.25rem 1rem; border: 1px solid var(--border-color); width: 300px;">
                        <input type="text" placeholder="Search by name or ID..." style="width:100%; border:none; outline:none; font-family: var(--font-body); padding: 0.5rem;">
                    </div>
                </div>

                <div class="table-wrapper table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Property Name</th>
                                <th>Location</th>
                                <th>Owner ID</th>
                                <th style="text-align:right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="all-hotels-list">
                            <tr><td colspan="5" class="text-center">Loading properties...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                window.location.href = '/login.html';
                return;
            }
            
            loadAdminData();
        });

        function showSection(id, event) {
            if(event) event.preventDefault();
            ['overview', 'hotels-list'].forEach(sec => {
                document.getElementById(sec).classList.add('d-none');
            });
            document.getElementById(id).classList.remove('d-none');
            
            if(event) {
                document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
                event.currentTarget.classList.add('active');
            }
        }

        async function loadAdminData() {
            try {
                const hotels = await apiCall('/hotels');
                document.getElementById('stat-hotels').innerText = hotels.length;
                
                const tbody = document.getElementById('all-hotels-list');
                if (hotels.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">No properties registered on the platform.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = hotels.map(h => `
                    <tr>
                        <td style="color: var(--text-muted); font-weight: 500;">#${h.id}</td>
                        <td>
                            <div style="font-weight: 600; color: var(--primary-color);">${h.hotel_name}</div>
                        </td>
                        <td>${h.city}, ${h.country}</td>
                        <td><span class="badge badge-info">Owner #${h.owner_id}</span></td>
                        <td style="text-align:right;">
                            <button class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.8rem; border-color: var(--error); color: var(--error);" onclick="deleteHotel(${h.id})">Remove Property</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showToast(err.message, 'error');
            }
        }
        
        async function deleteHotel(id) {
            if(confirm('CRITICAL WARNING: Are you sure you want to delete this property? This will remove all associated rooms and bookings permanently.')) {
                try {
                    await apiCall(`/hotels/${id}`, 'DELETE');
                    showToast('Property deleted successfully', 'success');
                    loadAdminData();
                } catch(err) {
                    showToast(err.message, 'error');
                }
            }
        }
    </script>
</body>
</html>
