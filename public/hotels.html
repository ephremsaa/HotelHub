<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelHub - Destinations</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .search-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 992px) {
            .search-layout { grid-template-columns: 1fr; }
        }
        .filter-sidebar {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .filter-section {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        .filter-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .filter-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }
        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
            font-size: 0.95rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                HotelHub
            </a>
            
            <ul class="nav-menu d-none" id="main-nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/hotels.html" class="active">Destinations</a></li>
                <li><a href="#">Offers</a></li>
            </ul>

            <div class="nav-auth" id="nav-auth"></div>
        </div>
    </nav>

    <main class="container">
        <div class="search-layout">
            
            <!-- Sidebar Filters -->
            <aside class="filter-sidebar">
                <div class="filter-section">
                    <h3 class="filter-title">Search Destination</h3>
                    <input type="text" id="live-search" class="form-control" placeholder="E.g. Paris, New York...">
                </div>
                
                <div class="filter-section">
                    <h3 class="filter-title">Price Range</h3>
                    <input type="range" min="0" max="1000" value="1000" style="width: 100%; margin-bottom: 0.5rem;">
                    <div class="d-flex justify-between" style="font-size: 0.85rem; color: var(--text-muted);">
                        <span>0 BIRR</span>
                        <span>1000+ BIRR</span>
                    </div>
                </div>

                <div class="filter-section">
                    <h3 class="filter-title">Star Rating</h3>
                    <label class="filter-checkbox"><input type="checkbox"> 5 Stars (Luxury)</label>
                    <label class="filter-checkbox"><input type="checkbox"> 4 Stars (Premium)</label>
                    <label class="filter-checkbox"><input type="checkbox"> 3 Stars (Comfort)</label>
                </div>
                
                <div class="filter-section">
                    <h3 class="filter-title">Amenities</h3>
                    <label class="filter-checkbox"><input type="checkbox"> Swimming Pool</label>
                    <label class="filter-checkbox"><input type="checkbox"> Spa & Wellness</label>
                    <label class="filter-checkbox"><input type="checkbox"> Free WiFi</label>
                    <label class="filter-checkbox"><input type="checkbox"> Fitness Center</label>
                </div>
                
                <button class="btn btn-primary" style="width: 100%;">Apply Filters</button>
            </aside>
            
            <!-- Results Grid -->
            <div>
                <div class="d-flex justify-between align-center mb-4">
                    <div>
                        <h1 style="font-size: 1.75rem; margin-bottom: 0.25rem;" id="results-title">Available Hotels</h1>
                        <p style="color: var(--text-muted); font-size: 0.95rem;" id="results-count">Loading results...</p>
                    </div>
                    <div>
                        <select class="form-control" style="padding: 0.5rem 1rem; border-radius: var(--radius-full); width: auto;">
                            <option>Recommended</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                            <option>Highest Rated</option>
                        </select>
                    </div>
                </div>
                
                <div class="hotel-grid" id="hotels-grid">
                    <!-- Injection point -->
                </div>
            </div>
            
        </div>
    </main>
    
    <footer style="background: var(--primary-dark); color: white; padding: 4rem 2rem; margin-top: 4rem;">
        <div class="container d-flex justify-between" style="flex-wrap: wrap; gap: 2rem;">
            <div>
                <a href="/" class="logo" style="color: white; margin-bottom: 1rem;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    HotelHub
                </a>
            </div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        if (window.innerWidth > 768) {
            document.getElementById('main-nav-menu').classList.remove('d-none');
        }

        let allHotels = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchHotels();
            
            const liveSearch = document.getElementById('live-search');
            liveSearch.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = allHotels.filter(h => 
                    h.city.toLowerCase().includes(query) || 
                    h.hotel_name.toLowerCase().includes(query) ||
                    h.country.toLowerCase().includes(query)
                );
                renderHotels(filtered);
            });
        });

        async function fetchHotels() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const cityQuery = urlParams.get('city');
                
                if (cityQuery) {
                    document.getElementById('live-search').value = cityQuery;
                    document.getElementById('results-title').innerText = `Hotels in ${cityQuery}`;
                }

                const hotels = await apiCall('/hotels');
                allHotels = hotels;
                
                if (cityQuery) {
                    const filtered = hotels.filter(h => h.city.toLowerCase().includes(cityQuery.toLowerCase()));
                    renderHotels(filtered);
                } else {
                    renderHotels(hotels);
                }
            } catch (error) {
                console.error(error);
                document.getElementById('hotels-grid').innerHTML = '<p class="error">Failed to load hotels.</p>';
            }
        }
        
        function renderHotels(hotels) {
            document.getElementById('results-count').innerText = `${hotels.length} properties found`;
            const grid = document.getElementById('hotels-grid');
            
            if (hotels.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 4rem; background: var(--card-bg); border-radius: var(--radius-lg); border: 1px dashed var(--border-color);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1" style="margin-bottom: 1rem;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <h3 style="color: var(--text-main); margin-bottom: 0.5rem;">No destinations found</h3>
                        <p style="color: var(--text-muted);">Try adjusting your search filters.</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = hotels.map(hotel => `
                <div class="hotel-card" onclick="window.location.href='/hotel-details.html?id=${hotel.id}'">
                    <div class="img-wrapper">
                        <div class="badge-rating">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="color: var(--warning)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            ${hotel.star_rating}
                        </div>
                        <img src="${hotel.cover_image || 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80'}" alt="${hotel.hotel_name}">
                    </div>
                    <div class="hotel-card-content">
                        <h3 class="hotel-card-title">${hotel.hotel_name}</h3>
                        <div class="hotel-card-location">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            ${hotel.city}, ${hotel.country}
                        </div>
                        <div class="hotel-card-footer">
                            <div>
                                <div class="hotel-card-price" style="font-size: 1.25rem;">Explore <span>prices</span></div>
                            </div>
                            <button class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.85rem;">Select</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
