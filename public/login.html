<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelHub - Sign In</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-nav {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    
    <div class="auth-split">
        <div class="auth-image">
            <div class="auth-nav">
                <a href="/" class="logo" style="color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    HotelHub
                </a>
            </div>
        </div>
        <div class="auth-form-wrapper">
            <div class="auth-form-container">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access your account.</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="email">Email address</label>
                        <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <div class="d-flex justify-between">
                            <label class="form-label" for="password">Password</label>
                            <a href="#" style="font-size: 0.85rem; font-weight: 500;">Forgot password?</a>
                        </div>
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">Sign In</button>
                </form>
                
                <div style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.95rem;">
                    Don't have an account? <a href="/register.html" style="font-weight: 600;">Create one</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button[type="submit"]');
            
            setButtonLoading(btn, true, "Signing In...");
            
            
            try {
                const data = await apiCall('/auth/login', 'POST', { email, password });
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                showToast('Welcome back!', 'success');
                
                let dashboardLink = '/customer-dashboard.html';
                if (data.user.role === 'hotel_owner') dashboardLink = '/owner-dashboard.html';
                if (data.user.role === 'admin') dashboardLink = '/admin-dashboard.html';
                
                setTimeout(() => window.location.href = dashboardLink, 1000);
            } catch (err) {
                showToast(err.message, 'error');
                setButtonLoading(btn, false, "Sign In");
                
            }
        });

        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
